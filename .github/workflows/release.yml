name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in tauri.conf.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content src-tauri\tauri.conf.json -Raw
          $content = $content -replace '"version": "[^"]*"', "`"version`": `"$version`""
          Set-Content -Path src-tauri\tauri.conf.json -Value $content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '摸鱼日常 v${{ steps.version.outputs.VERSION }}'
          releaseBody: 'Download the installer below to install.'
          releaseDraft: false
          prerelease: false
